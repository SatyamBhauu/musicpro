<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Pro | Pastel Beats</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout-wrapper">
        <nav class="app-nav">
            <div class="logo-container">
                <span class="logo-icon">🌸</span>
                <h1 class="logo-text">Music Pro</h1>
            </div>
            <ul class="nav-links">
                <li class="nav-item active" data-view="home">
                    <span class="icon">🏠</span> <span class="label">Home</span>
                </li>
                <li class="nav-item" data-view="search">
                    <span class="icon">🔍</span> <span class="label">Search</span>
                </li>
                <li class="nav-item" data-view="library">
                    <span class="icon">📚</span> <span class="label">Library</span>
                </li>
            </ul>
        </nav>

        <main class="content-view">
            <header class="view-header">
                <div class="search-bar-container">
                    <input type="text" id="global-search" placeholder="Search for tracks..." class="soft-search">
                </div>
            </header>

            <section id="home-section" class="view-section">
                <h2 class="section-title">Editor's Picks</h2>
                <div id="playlist-grid" class="grid-container">
                    <p class="loading-msg">Waking up the music...</p>
                </div>
            </section>

            <section id="playlist-detail-section" class="view-section hidden">
                <button id="back-to-home" class="back-btn">← Back</button>
                <div class="playlist-header">
                    <div id="detail-cover" class="detail-img-placeholder"></div>
                    <div class="detail-meta">
                        <h2 id="detail-title">Loading...</h2>
                        <p id="detail-desc"></p>
                    </div>
                </div>
                <div id="track-list" class="track-list"></div>
            </section>
        </main>
    </div>

    <footer class="player-bar">
        <div class="current-track">
            <div id="player-art" class="track-art"></div>
            <div class="track-info">
                <span id="player-title" class="track-name">No track selected</span>
                <span id="player-artist" class="track-artist">Pick a vibe!</span>
            </div>
        </div>
        <div class="player-controls">
            <button id="prev-btn" class="icon-btn">⏮</button>
            <button id="play-btn" class="play-pause-btn">▶</button>
            <button id="next-btn" class="icon-btn">⏭</button>
        </div>
        <div class="player-utils">
            <input type="range" id="volume-slider" class="soft-range" min="0" max="1" step="0.01" value="0.8">
        </div>
        <audio id="main-audio-player"></audio>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
