<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Pro | Pure Vibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout-wrapper">
        <nav class="app-nav">
            <div class="logo-container">
                <span class="logo-icon">🌸</span>
                <h1 class="logo-text">Music Pro</h1>
            </div>
            <ul class="nav-links">
                <li class="nav-item active" id="nav-home-btn">
                    <span class="icon">🏠</span> <span class="label">Home</span>
                </li>
                <li class="nav-item" id="nav-search-btn">
                    <span class="icon">🔍</span> <span class="label">Search</span>
                </li>
            </ul>
        </nav>

        <main class="content-view">
            <header class="view-header">
                <div class="search-bar-container">
                    <input type="text" id="global-search" placeholder="Type song name & press Enter..." class="soft-search">
                </div>
            </header>

            <section id="home-view" class="view-section">
                <h2 class="section-title">Editor's Picks</h2>
                <div id="playlist-grid" class="grid-container">
                    <p class="status-msg">Welcome! Search for a song to start the vibe. ✨</p>
                </div>
            </section>

            <section id="search-view" class="view-section hidden">
                <h2 class="section-title">Search Results</h2>
                <div id="search-results-grid" class="results-list">
                    </div>
            </section>
        </main>
    </div>

    <footer class="player-bar">
        <div class="current-track">
            <img id="player-art" class="track-art" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <div class="track-info">
                <span id="player-title" class="track-name">No track selected</span>
                <span id="player-artist" class="track-artist">Pick a vibe!</span>
            </div>
        </div>
        
        <div class="player-center">
            <div class="player-controls">
                <button id="prev-btn" class="icon-btn">⏮</button>
                <button id="play-btn" class="play-pause-btn">▶</button>
                <button id="next-btn" class="icon-btn">⏭</button>
            </div>
            <div class="progress-container">
                <span id="current-time" class="time">0:00</span>
                <input type="range" id="progress-bar" class="soft-range" min="0" max="100" value="0">
                <span id="duration-time" class="time">0:00</span>
            </div>
        </div>

        <div class="player-utils">
            <input type="range" id="volume-slider" class="soft-range" min="0" max="1" step="0.01" value="0.8">
        </div>
        
        <footer class="player-bar">
    <audio id="main-audio-player"></audio>
</footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
